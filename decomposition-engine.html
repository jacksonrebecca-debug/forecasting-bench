<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Decomposition Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --ground:#0E1218;--panel:#171D27;--panel-2:#1E2530;--line:#2B333F;
  --ink:#E9ECF2;--muted:#8A95A6;--faint:#5A6475;
  --signal:#E8B04B;--signal-dim:#7a5e2a;--truth:#4FB3A6;--warn:#E07A5F;--gut:#8E7CC3;
  --shadow:rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ground);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;justify-content:center;padding:28px 18px 64px}
.wrap{width:100%;max-width:680px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--signal);margin-bottom:10px}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:33px;letter-spacing:-.02em;line-height:1.05;margin-bottom:14px}
.lede{color:var(--muted);font-size:15px;line-height:1.62;max-width:58ch}
.lede b{color:var(--ink);font-weight:600}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 8px 30px var(--shadow)}
.mt{margin-top:18px}.mt-l{margin-top:26px}.hr{height:1px;background:var(--line);margin:22px 0}
button.primary{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:15px;color:#15110a;background:var(--signal);border:none;padding:13px 22px;border-radius:10px;cursor:pointer;transition:.15s}
button.primary:hover{filter:brightness(1.07)}
button.primary:disabled{opacity:.4;cursor:not-allowed}
button.ghost{font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.06em;color:var(--muted);background:none;border:1px solid var(--line);padding:11px 16px;border-radius:9px;cursor:pointer;transition:.15s}
button.ghost:hover{border-color:var(--faint);color:var(--ink)}
button:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
.actions{display:flex;gap:12px;align-items:center;margin-top:24px}.actions .primary{flex:1}
.scn{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.scn-card{text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:16px 18px;cursor:pointer;transition:.15s}
.scn-card:hover{border-color:var(--signal)}
.scn-card .t{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:16px;margin-bottom:4px}
.scn-card .m{font-size:13px;color:var(--muted);line-height:1.5}
.scn-card .tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--signal-dim);margin-top:8px;display:inline-block}
.steprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.stepname{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
.module{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--signal)}
.qtitle{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:21px;line-height:1.32;letter-spacing:-.01em;margin-bottom:12px}
.body-txt{font-size:14.5px;line-height:1.66;color:var(--muted)}.body-txt b{color:var(--ink);font-weight:600}
.formula{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--truth);background:var(--ground);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:14px 0 4px;line-height:1.6}
.readout{font-family:'IBM Plex Mono',monospace;font-weight:600;font-variant-numeric:tabular-nums;font-size:46px;letter-spacing:-.02em;color:var(--signal);line-height:1;margin:18px 0 2px;text-align:center}
.readout-cap{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:16px}
.single-input{display:flex;justify-content:center;margin:8px 0}
.single-input input{width:220px;font-family:'IBM Plex Mono',monospace;font-size:24px;font-variant-numeric:tabular-nums;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;text-align:center}
.single-input input:focus{outline:none;border-color:var(--signal)}
.factor{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.factor .flab{font-size:14px;font-weight:500;margin-bottom:3px}
.factor .fhint{font-size:12.5px;color:var(--faint);line-height:1.45;margin-bottom:10px}
.factor .frow{display:flex;gap:10px;align-items:center}
.factor .fcell{flex:1}
.factor .fcell label{display:block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.factor .fcell input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:17px;font-variant-numeric:tabular-nums;color:var(--ink);background:var(--ground);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
.factor .fcell input:focus{outline:none;border-color:var(--signal)}
.factor .funit{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;min-width:78px}
.factor.const{display:flex;justify-content:space-between;align-items:center;opacity:.8}
.factor.const .flab{margin:0}
.factor.const .cval{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--truth)}
.op{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--faint);margin:-4px 0 6px}
.bigresult{text-align:center;margin:4px 0}
.bigresult .v{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:40px;color:var(--signal);letter-spacing:-.02em}
.bigresult .ci{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:6px}
.plotcap{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:18px 0 4px}
svg{display:block;width:100%;height:auto}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
.cmp{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:18px}
.cmp .c{background:var(--panel);padding:14px 12px;text-align:center}
.cmp .c .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.cmp .c .v{font-family:'IBM Plex Mono',monospace;font-size:18px;font-variant-numeric:tabular-nums}
.verdict{border-radius:10px;padding:14px 16px;margin-top:16px;font-size:14px;line-height:1.6}
.verdict.good{background:rgba(79,179,166,.1);border:1px solid rgba(79,179,166,.4);color:var(--truth)}
.verdict.miss{background:rgba(224,122,95,.1);border:1px solid rgba(224,122,95,.4);color:var(--warn)}
.verdict b{font-weight:600}
.sens{margin-top:18px}
.sens .srow{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.sens .sname{font-size:13px;color:var(--ink);width:42%;line-height:1.3}
.sens .sbar{flex:1;height:9px;background:var(--ground);border-radius:5px;overflow:hidden}
.sens .sbar i{display:block;height:100%;background:var(--signal);border-radius:5px}
.sens .spct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);width:42px;text-align:right}
.lesson{border-left:2px solid var(--signal);padding:4px 0 4px 16px;margin-top:20px}
.lesson h3{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:16px;margin-bottom:8px}
.lesson p{font-size:14px;line-height:1.66;color:var(--muted)}.lesson p b{color:var(--ink);font-weight:600}
.foot{margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--faint);line-height:1.7}
@media (max-width:520px){h1{font-size:27px}.qtitle{font-size:19px}.readout{font-size:38px}.bigresult .v{font-size:32px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ============================================================
   THE DECOMPOSITION ENGINE  \u00b7  Instrument 03
   Fermi-isation: turn an impossible question into a product of
   guessable ones, give each a 90% range, propagate the
   uncertainty by Monte Carlo, and see where your doubt lives.
   ============================================================ */

/* factor kinds:
   estimate -> player gives [lo,hi] 90% interval (lognormal)
   constant -> fixed multiplier shown for transparency
   op: 'mul' | 'div'                                            */
const SCENARIOS = [
  {
    id:'piano',
    menuTitle:'Piano tuners in Chicago',
    menuBlurb:'Enrico Fermi\u2019s own puzzle \u2014 the founding example of the whole method.',
    tag:'The classic',
    question:'How many piano tuners work in the city of Chicago?',
    formula:'tuners = (population \u00f7 people per household) \u00d7 share with a piano \u00d7 tunings per piano a year \u00f7 tunings one tuner does a year',
    gutPrompt:'Off the top of your head \u2014 your single best guess?',
    truth:125, truthNote:'Commonly estimated at roughly 50\u2013150. The win here is the order of magnitude, not the exact figure.',
    factors:[
      {id:'pop',kind:'estimate',op:'mul',label:'Population of Chicago',hint:'The city proper, not the wider metro area.',unit:'people',lo:2000000,hi:3500000},
      {id:'pph',kind:'estimate',op:'div',label:'People per household',hint:'Divide population by this to get households.',unit:'per home',lo:2,hi:3},
      {id:'frac',kind:'estimate',op:'mul',label:'Share of households with a piano',hint:'A small fraction \u2014 think in percent, entered as a decimal.',unit:'(0\u20131)',lo:0.02,hi:0.1},
      {id:'tpp',kind:'estimate',op:'mul',label:'Tunings per piano per year',hint:'A cared-for piano is tuned about once or twice a year.',unit:'per year',lo:0.5,hi:2},
      {id:'tpt',kind:'estimate',op:'div',label:'Tunings one tuner does per year',hint:'Jobs per day \u00d7 working days. Divide by this.',unit:'per tuner',lo:600,hi:1500}
    ]
  },
  {
    id:'cells',
    menuTitle:'Cells in an EV battery pack',
    menuBlurb:'How many lithium-ion cells inside a long-range electric car? Your territory.',
    tag:'Deep tech',
    question:'How many lithium-ion cells are in a long-range Tesla Model 3 battery pack?',
    formula:'cells = pack energy (kWh) \u00d7 1000 \u00f7 energy per cell (Wh)',
    gutPrompt:'Quick gut number \u2014 how many cells?',
    truth:4400, truthNote:'The Model 3 Long Range uses roughly 4,400 cylindrical \u201c2170\u201d cells.',
    factors:[
      {id:'pack',kind:'estimate',op:'mul',label:'Gross pack energy',hint:'A long-range EV pack.',unit:'kWh',lo:60,hi:95},
      {id:'k',kind:'constant',op:'mul',label:'Watt-hours per kWh',value:1000,unit:'Wh/kWh'},
      {id:'cell',kind:'estimate',op:'div',label:'Energy per cell',hint:'A single 2170 cell. Divide by this.',unit:'Wh/cell',lo:12,hi:25}
    ]
  },
  {
    id:'heart',
    menuTitle:'Heartbeats in a lifetime',
    menuBlurb:'How many times does a human heart beat across an entire life?',
    tag:'Big number',
    question:'How many times does an average human heart beat in a lifetime?',
    formula:'beats = rate (per min) \u00d7 60 \u00d7 24 \u00d7 365 \u00d7 lifespan (years)',
    gutPrompt:'Gut guess \u2014 how many beats, total?',
    truth:2900000000, truthNote:'Around 2.5\u20133 billion beats for a typical lifespan.',
    factors:[
      {id:'rate',kind:'estimate',op:'mul',label:'Average heart rate',hint:'Resting plus activity, averaged over a life.',unit:'beats/min',lo:60,hi:85},
      {id:'m',kind:'constant',op:'mul',label:'Minutes per hour',value:60,unit:'\u00d760'},
      {id:'h',kind:'constant',op:'mul',label:'Hours per day',value:24,unit:'\u00d724'},
      {id:'d',kind:'constant',op:'mul',label:'Days per year',value:365,unit:'\u00d7365'},
      {id:'life',kind:'estimate',op:'mul',label:'Lifespan',hint:'An average human life.',unit:'years',lo:70,hi:90}
    ]
  },
  {
    id:'pool',
    menuTitle:'Water in an Olympic pool',
    menuBlurb:'How many litres fill a standard Olympic swimming pool?',
    tag:'Warm-up',
    question:'How many litres of water are in an Olympic swimming pool?',
    formula:'litres = length \u00d7 width \u00d7 average depth \u00d7 1000',
    gutPrompt:'Gut guess \u2014 how many litres?',
    truth:2500000, truthNote:'A regulation pool holds about 2.5 million litres.',
    factors:[
      {id:'len',kind:'estimate',op:'mul',label:'Length',hint:'Olympic standard.',unit:'m',lo:40,hi:55},
      {id:'wid',kind:'estimate',op:'mul',label:'Width',hint:'Eight to ten lanes.',unit:'m',lo:20,hi:30},
      {id:'dep',kind:'estimate',op:'mul',label:'Average depth',hint:'Averaged across the pool.',unit:'m',lo:1.5,hi:2.5},
      {id:'k',kind:'constant',op:'mul',label:'Litres per cubic metre',value:1000,unit:'L/m\u00b3'}
    ]
  }
];

/* ---------- maths ---------- */
const Z90=1.6448536; // one-sided z for a 90% central interval
let spare=null;
function randn(){ if(spare!==null){const s=spare;spare=null;return s;} const u=Math.random()||1e-9,v=Math.random()||1e-9; const r=Math.sqrt(-2*Math.log(u)); spare=r*Math.sin(2*Math.PI*v); return r*Math.cos(2*Math.PI*v); }
function logParams(lo,hi){ const a=Math.log(lo),b=Math.log(hi); return {mu:(a+b)/2, sigma:Math.max((b-a)/(2*Z90),1e-9)}; }
function fmtNum(n){
  if(!isFinite(n)) return '\u2013';
  if(n>=1e9) return +(n/1e9).toPrecision(2)+' bn';
  if(n>=1e6) return +(n/1e6).toPrecision(2)+' M';
  const s2=Number(n.toPrecision(2));
  return s2.toLocaleString('en-GB');
}
function fmtPow(p){const m={0:'1',1:'10',2:'100',3:'1k',4:'10k',5:'100k',6:'1M',7:'10M',8:'100M',9:'1bn',10:'10bn'};return m[p]!==undefined?m[p]:('1e'+p);}

function runMC(scn,ranges,N){
  N=N||4000;
  const est=scn.factors.filter(f=>f.kind==='estimate');
  const lp={}; est.forEach(f=>{lp[f.id]=logParams(ranges[f.id].lo,ranges[f.id].hi);});
  const finals=new Array(N);
  for(let i=0;i<N;i++){
    let r=1;
    for(const f of scn.factors){
      let v;
      if(f.kind==='constant') v=f.value;
      else { const p=lp[f.id]; v=Math.exp(p.mu+p.sigma*randn()); }
      r = f.op==='div' ? r/v : r*v;
    }
    finals[i]=r;
  }
  finals.sort((a,b)=>a-b);
  const q=t=>finals[Math.min(N-1,Math.max(0,Math.floor(t*N)))];
  // sensitivity: share of variance of ln(result) from each estimate factor (independent)
  let tot=0; const parts=est.map(f=>{const s=lp[f.id].sigma;return {label:f.label,v:s*s};}); parts.forEach(p=>tot+=p.v);
  parts.forEach(p=>p.share = tot>0? p.v/tot : 0);
  parts.sort((a,b)=>b.share-a.share);
  return {finals, p5:q(0.05), p50:q(0.5), p95:q(0.95), p02:q(0.02), p98:q(0.98), sens:parts};
}

/* ---------- histogram ---------- */
function histogram(res, truth, gut){
  const W=620,H=240,padL=14,padR=14,padT=14,padB=34;
  const L=v=>Math.log10(Math.max(v,1e-12));
  let lo=Math.min(L(res.p02), L(truth), L(gut))-0.15;
  let hi=Math.max(L(res.p98), L(truth), L(gut))+0.15;
  if(hi-lo<0.6){lo-=0.3;hi+=0.3;}
  const NB=26, binW=(hi-lo)/NB, counts=new Array(NB).fill(0);
  res.finals.forEach(f=>{let b=Math.floor((L(f)-lo)/binW); if(b<0)b=0; if(b>=NB)b=NB-1; counts[b]++;});
  const maxC=Math.max(...counts,1);
  const x=lv=>padL+((lv-lo)/(hi-lo))*(W-padL-padR);
  const yTop=padT, yBase=H-padB, plotH=yBase-yTop;
  let bars='';
  for(let b=0;b<NB;b++){const bx=x(lo+b*binW), bw=(W-padL-padR)/NB-1.5, bh=(counts[b]/maxC)*plotH;
    bars+=`<rect x="${bx.toFixed(1)}" y="${(yBase-bh).toFixed(1)}" width="${Math.max(bw,1).toFixed(1)}" height="${bh.toFixed(1)}" fill="rgba(232,176,75,.55)" rx="1"/>`;}
  // axis ticks at integer powers of ten
  let ticks='';
  for(let p=Math.ceil(lo);p<=Math.floor(hi);p++){const tx=x(p);
    ticks+=`<line x1="${tx}" y1="${yTop}" x2="${tx}" y2="${yBase}" stroke="var(--line)" stroke-width="1"/><text x="${tx}" y="${yBase+20}" text-anchor="middle" fill="var(--faint)" font-family="IBM Plex Mono" font-size="10.5">${fmtPow(p)}</text>;`}
  const marker=(v,color,lab,dash)=>{const mx=x(L(v));return `<line x1="${mx}" y1="${yTop-2}" x2="${mx}" y2="${yBase}" stroke="${color}" stroke-width="2" ${dash?'stroke-dasharray="4 3"':''}/><text x="${mx}" y="${yTop+8}" text-anchor="middle" fill="${color}" font-family="IBM Plex Mono" font-size="10" transform="rotate(0)">${lab}</text>`;};
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Distribution of your estimate">
    <line x1="${padL}" y1="${yBase}" x2="${W-padR}" y2="${yBase}" stroke="var(--line)" stroke-width="1.5"/>
    ${ticks}${bars}
    ${marker(gut,'var(--gut)','gut',true)}
    ${marker(res.p50,'var(--signal)','est',false)}
    ${marker(truth,'var(--truth)','true',false)}
  </svg>`;
}

/* ---------- app ---------- */
let S={screen:'intro'};
const app=document.getElementById('app');
function h(s){const t=document.createElement('template');t.innerHTML=s.trim();return t.content.firstChild;}
function render(){app.innerHTML='';({intro:rIntro,menu:rMenu,gut:rGut,decompose:rDecomp,result:rResult})[S.screen]();window.scrollTo&&window.scrollTo(0,0);}

function rIntro(){
  const card=h(`<div>
    <div class="eyebrow">The Forecasting Bench \u00b7 Instrument 03</div>
    <h1>The Decomposition Engine</h1>
    <p class="lede">Asked \u201chow many piano tuners are in Chicago?\u201d most people freeze, then blurt a number that\u2019s wrong by a factor of fifty. Enrico Fermi wouldn\u2019t. He\u2019d <b>break the impossible question into guessable pieces</b> \u2014 population, pianos, tunings \u2014 estimate each within a range, and multiply. The errors partly cancel, and the answer lands remarkably close.<br><br>This is the forecaster\u2019s most powerful move, and it\u2019s exactly how you size a market or a company metric. You\u2019ll guess once cold, then decompose \u2014 giving each piece a <b>90% range</b>, not a point \u2014 and watch the engine roll thousands of simulations to show your answer as a <b>distribution</b>, and tell you which guess your uncertainty is really hiding in.</p>
    <div class="actions"><button class="primary" id="go">Choose a question</button></div>
    <div class="foot">Trains: Fermi-isation \u00b7 decomposition \u00b7 propagating uncertainty \u00b7 finding the weak link.</div>
  </div>`);
  app.appendChild(card);card.querySelector('#go').onclick=()=>{S.screen='menu';render();};
}

function rMenu(){
  const card=h(`<div>
    <div class="eyebrow">Pick a question to decompose</div>
    <h1 style="font-size:26px">Four to start</h1>
    <div class="scn" id="scn"></div>
    <div class="foot">Same method scales to any forecast \u2014 a market size, a conversion rate, a unit count.</div>
  </div>`);
  app.appendChild(card);
  const wrap=card.querySelector('#scn');
  SCENARIOS.forEach((s,i)=>{
    const c=h(`<button class="scn-card"><div class="t">${s.menuTitle}</div><div class="m">${s.menuBlurb}</div><span class="tag">${s.tag}</span></button>`);
    c.onclick=()=>start(i); wrap.appendChild(c);
  });
}

function start(i){
  S={screen:'gut',si:i,scn:SCENARIOS[i],gut:'',ranges:{}};
  S.scn.factors.forEach(f=>{ if(f.kind==='estimate') S.ranges[f.id]={lo:'',hi:''}; });
  render();
}

function rGut(){
  const s=S.scn;
  const card=h(`<div>
    <div class="steprow"><span class="stepname">Step 1 \u00b7 Cold guess</span><span class="module">no working allowed</span></div>
    <div class="qtitle">${s.question}</div>
    <div class="card">
      <p class="body-txt">First, the honest gut number \u2014 whatever leaps to mind, before any reasoning. We\u2019ll keep it to compare against your decomposition.</p>
      <div class="readout-cap" style="margin-top:18px">${s.gutPrompt}</div>
      <div class="single-input"><input id="gut" type="number" inputmode="numeric" placeholder="?" value="${S.gut}"></div>
      <div class="actions"><button class="primary" id="next" disabled>Lock it, then decompose</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  const inp=card.querySelector('#gut'), next=card.querySelector('#next');
  const check=()=>{const v=parseFloat(inp.value); next.disabled=!(v>0); S.gut=inp.value;};
  inp.oninput=check; check();
  next.onclick=()=>{ if(parseFloat(inp.value)>0){S.gut=parseFloat(inp.value);S.screen='decompose';render();} };
}

function rDecomp(){
  const s=S.scn;
  const card=h(`<div>
    <div class="steprow"><span class="stepname">Step 2 \u00b7 Decompose</span><span class="module">90% ranges</span></div>
    <div class="qtitle">${s.question}</div>
    <div class="card">
      <div class="formula">${s.formula}</div>
      <p class="body-txt" style="margin:12px 0 16px">For each piece, give a <b>low</b> and <b>high</b> you\u2019re about 90% sure the true value sits between. Wide enough to be honest; narrow enough to be useful.</p>
      <div id="factors"></div>
      <div class="actions"><button class="primary" id="run" disabled>Run 4,000 simulations</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  const fw=card.querySelector('#factors'), run=card.querySelector('#run');
  s.factors.forEach(f=>{
    if(f.kind==='constant'){
      fw.appendChild(h(`<div class="factor const"><span class="flab">${f.label}</span><span class="cval">${f.unit||('\u00d7'+f.value)}</span></div>`));
      return;
    }
    const el=h(`<div class="factor">
      <div class="flab">${f.label}</div>
      <div class="fhint">${f.hint||''}</div>
      <div class="frow">
        <div class="fcell"><label>Low</label><input data-f="${f.id}" data-b="lo" type="number" inputmode="decimal" placeholder="${f.lo}" value="${S.ranges[f.id].lo}"></div>
        <div class="fcell"><label>High</label><input data-f="${f.id}" data-b="hi" type="number" inputmode="decimal" placeholder="${f.hi}" value="${S.ranges[f.id].hi}"></div>
        <div class="funit">${f.unit||''}</div>
      </div>
    </div>`);
    fw.appendChild(el);
  });
  const valid=()=>{
    return s.factors.filter(f=>f.kind==='estimate').every(f=>{
      const r=S.ranges[f.id]; const lo=parseFloat(r.lo), hi=parseFloat(r.hi);
      return lo>0 && hi>0;
    });
  };
  fw.querySelectorAll('input').forEach(inp=>{
    inp.oninput=()=>{ S.ranges[inp.dataset.f][inp.dataset.b]=inp.value; run.disabled=!valid(); };
  });
  run.disabled=!valid();
  run.onclick=()=>{
    // normalise lo/hi order
    const rngs={};
    s.factors.filter(f=>f.kind==='estimate').forEach(f=>{
      let lo=parseFloat(S.ranges[f.id].lo), hi=parseFloat(S.ranges[f.id].hi);
      if(lo>hi){const t=lo;lo=hi;hi=t;}
      rngs[f.id]={lo,hi};
    });
    S.res=runMC(s,rngs); S.usedRanges=rngs; S.screen='result'; render();
  };
}

function rResult(){
  const s=S.scn, res=S.res, truth=s.truth, gut=S.gut;
  const hit = truth>=res.p5 && truth<=res.p95;
  const estErr = res.p50>=truth ? res.p50/truth : truth/res.p50;
  const gutErr = gut>=truth ? gut/truth : truth/gut;
  const better = gutErr/Math.max(estErr,1e-9);
  let verdict, vcls;
  if(hit && estErr<2.2){ vcls='good'; verdict=`Your decomposition\u2019s median came within a factor of <b>${estErr.toFixed(1)}\u00d7</b> of the truth, and your 90% range <b>caught it</b>. Your cold guess was off by about <b>${gutErr.toFixed(1)}\u00d7</b>.`; }
  else if(hit){ vcls='good'; verdict=`Your 90% range <b>caught the truth</b> \u2014 honest uncertainty. The median was off by ${estErr.toFixed(1)}\u00d7; your cold guess by ${gutErr.toFixed(1)}\u00d7.`; }
  else { vcls='miss'; verdict=`The truth fell <b>outside</b> your 90% range \u2014 the classic sign the pieces were pinned too tightly. Still, the decomposition (off ${estErr.toFixed(1)}\u00d7) likely beat your cold guess (off ${gutErr.toFixed(1)}\u00d7).`; }
  const sensTop=res.sens[0];
  const sensRows=res.sens.map(p=>`<div class="srow"><div class="sname">${p.label}</div><div class="sbar"><i style="width:${Math.round(p.share*100)}%"></i></div><div class="spct">${Math.round(p.share*100)}%</div></div>`).join('');
  const card=h(`<div>
    <div class="steprow"><span class="stepname">Step 3 \u00b7 The distribution</span><span class="module">${s.menuTitle}</span></div>
    <div class="qtitle">${s.question}</div>
    <div class="card">
      <div class="bigresult">
        <div class="v">\u2248 ${fmtNum(res.p50)}</div>
        <div class="ci">90% range &nbsp;${fmtNum(res.p5)} &nbsp;\u2013&nbsp; ${fmtNum(res.p95)}</div>
      </div>
      <div class="plotcap">where 4,000 simulations landed \u00b7 log scale</div>
      ${histogram(res,truth,gut)}
      <div class="legend"><span><i style="background:var(--gut)"></i>your gut</span><span><i style="background:var(--signal)"></i>decomposed median</span><span><i style="background:var(--truth)"></i>true answer</span></div>
      <div class="cmp">
        <div class="c"><div class="k">Cold gut</div><div class="v" style="color:var(--gut)">${fmtNum(gut)}</div></div>
        <div class="c"><div class="k">Decomposed</div><div class="v" style="color:var(--signal)">${fmtNum(res.p50)}</div></div>
        <div class="c"><div class="k">Truth</div><div class="v" style="color:var(--truth)">${fmtNum(truth)}</div></div>
      </div>
      <div class="verdict ${vcls}">${verdict}<span style="display:block;margin-top:7px;color:var(--faint)">${s.truthNote}</span></div>

      <div class="sens">
        <div class="plotcap" style="margin-top:0">where your uncertainty lives</div>
        ${sensRows}
        <p class="body-txt" style="margin-top:10px">Most of the spread in your answer comes from <b>${sensTop.label.toLowerCase()}</b> (${Math.round(sensTop.share*100)}%). If you had an hour to sharpen this forecast, that\u2019s the one number to go and research \u2014 tightening any other piece barely moves the result.</p>
      </div>

      <div class="lesson"><h3>The lesson</h3><p>A single wild guess has nowhere to hide its errors. <b>Decomposition spreads them across pieces you can actually reason about</b>, and they partly cancel \u2014 which is why a chain of rough ranges routinely beats one confident number. Two habits make it work: give every piece a <b>range, not a point</b>, so your final answer arrives as a distribution that owns its uncertainty; and read the sensitivity bars, because forecasting effort should flow to the <b>one or two pieces carrying most of the doubt</b>, not spread evenly across all of them.</p></div>

      <div class="actions"><button class="primary" id="again">Decompose another</button><button class="ghost" id="retry">Retry this one</button></div>
    </div>
    <div class="foot">Break it down \u00b7 range every piece \u00b7 multiply \u00b7 attack the weak link.</div>
  </div>`);
  app.appendChild(card);
  card.querySelector('#again').onclick=()=>{S.screen='menu';render();};
  card.querySelector('#retry').onclick=()=>start(S.si);
}

render();
</script>
</body>
</html>
