<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aggregator \u00b7 Forecasting Bench</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --ground:#0E1218;--panel:#171D27;--panel-2:#1E2530;--line:#2B333F;--line-2:#3A4654;
  --ink:#E9ECF2;--muted:#8A95A6;--faint:#5A6475;
  --signal:#E8B04B;--truth:#4FB3A6;--warn:#E07A5F;--gut:#8E7CC3;
  --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ground);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;justify-content:center;padding:28px 18px 70px}
.wrap{width:100%;max-width:680px}
.back{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-decoration:none;margin-bottom:18px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--signal);margin-bottom:12px}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,6vw,44px);letter-spacing:-.02em;line-height:1.02;margin-bottom:16px}
.lede{color:var(--muted);font-size:15.5px;line-height:1.62}
.lede b{color:var(--ink);font-weight:600}
.card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:22px;box-shadow:0 10px 30px var(--shadow);margin-top:20px}
.steprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.stepname{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
.module{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--signal)}
.track{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:18px}
.track i{display:block;height:100%;background:var(--signal)}
.qtitle{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;line-height:1.28;margin-bottom:16px}
.body-txt{color:var(--muted);font-size:14.5px;line-height:1.6}
.body-txt b{color:var(--ink);font-weight:600}
.mt{margin-top:14px}
.analyst{display:flex;gap:13px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
.analyst:first-child{border-top:none}
.analyst .est{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--ink);min-width:46px;text-align:right}
.analyst .nm{font-size:13.5px;font-weight:600;color:var(--ink)}
.analyst .nm span{font-weight:400;color:var(--faint);font-size:12px;margin-left:6px;font-family:'IBM Plex Mono',monospace}
.analyst .rs{font-size:13px;color:var(--muted);line-height:1.5;margin-top:2px}
.readout-cap{text-align:center;font-size:12.5px;color:var(--faint);margin:18px 0 2px}
.readout{font-family:'IBM Plex Mono',monospace;font-weight:600;text-align:center}
.readout .pv{font-size:38px;color:var(--gut)}.readout .pct{font-size:19px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--gut) var(--fill,50%),var(--line) var(--fill,50%));outline:none;cursor:pointer;margin:10px 0;touch-action:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--gut);border:3px solid var(--ground);box-shadow:0 0 0 1px var(--gut),0 2px 6px var(--shadow);cursor:grab}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--gut);border:3px solid var(--ground);box-shadow:0 0 0 1px var(--gut);cursor:grab}
input[type=range]:focus-visible{outline:2px solid var(--gut);outline-offset:6px}
.scale{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint)}
.actions{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
button.primary{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;background:var(--signal);color:#1a1205;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;transition:.15s}
button.primary:hover{filter:brightness(1.07)}
button.ghost{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14px;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:13px 18px;cursor:pointer}
button.ghost:hover{border-color:var(--line-2);color:var(--ink)}
.bars{margin:6px 0 2px}
.barrow{display:flex;align-items:center;gap:11px;margin-bottom:11px;font-size:13px}
.barrow .bl{width:92px;color:var(--muted);flex-shrink:0}
.barrow .bt{flex:1;height:22px;background:var(--ground);border:1px solid var(--line);border-radius:6px;position:relative;overflow:visible}
.barrow .bt .fillb{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.barrow .bt .tmark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--truth);transform:translateX(-1px);box-shadow:0 0 5px rgba(79,179,166,.8)}
.barrow .bv{font-family:'IBM Plex Mono',monospace;font-size:13px;width:42px;text-align:right;flex-shrink:0}
.barlegend{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint);text-align:right;margin-top:-2px}
.verdict{border-radius:11px;padding:14px 16px;margin-top:14px;font-size:14px;line-height:1.55}
.verdict.good{background:rgba(79,179,166,.1);border:1px solid rgba(79,179,166,.34)}
.verdict.miss{background:rgba(224,122,95,.1);border:1px solid rgba(224,122,95,.34)}
.verdict b{color:var(--ink)}
.kpis{display:flex;gap:10px;margin:16px 0 4px}
.kpi{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;text-align:center}
.kpi .v{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600}
.kpi .k{font-size:11px;color:var(--faint);margin-top:3px;line-height:1.3}
.lesson li{color:var(--muted);font-size:14.5px;line-height:1.6;margin-bottom:12px;list-style:none;padding-left:18px;position:relative}
.lesson li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--signal)}
.lesson li b{color:var(--ink);font-weight:600}
.foot{margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--faint);text-align:center}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const app=document.getElementById('app');
function h(s){const t=document.createElement('template');t.innerHTML=s.trim();return t.content.firstChild;}
const logit=p=>Math.log(p/(1-p)), sig=x=>1/(1+Math.exp(-x));
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const simpleMean=ps=>mean(ps);
const extremized=(ps,a)=>sig(a*mean(ps.map(logit)));
const A_EXTREME=1.6;
const pct=p=>Math.round(p*100);

const SCN=[
 {id:'trial',truth:1,
  question:'Will the Phase 2 trial hit its primary endpoint?',
  resolution:'It hit the endpoint.',
  analysts:[
   {n:'Bench scientist',t:'mechanism',e:.55,r:'The biology is sound but the animal effect size was modest.'},
   {n:'Trial statistician',t:'priors',e:.70,r:'Powering looks adequate; designs in this class usually read out positive.'},
   {n:'Sector PM',t:'comparables',e:.60,r:'Comparable programmes have a mixed but slightly favourable hit rate.'},
   {n:'Ex-regulator',t:'endpoints',e:.75,r:'The chosen endpoint is forgiving and well-precedented.'},
   {n:'Short-seller',t:'sceptic',e:.50,r:'Management has over-promised before; I trust nothing until the data.'}
  ]},
 {id:'incumbent',truth:0,
  question:'Will the incumbent hold the marginal seat?',
  resolution:'The incumbent lost.',
  analysts:[
   {n:'Pollster',t:'data',e:.40,r:'Topline has them a couple of points behind, within the margin.'},
   {n:'Local agent',t:'ground game',e:.35,r:'Doorstep mood is sour; the turnout machine looks weaker.'},
   {n:'Historian',t:'base rate',e:.45,r:'Incumbents usually have an edge \u2014 but not in a cost-of-living slump.'},
   {n:'Economist',t:'fundamentals',e:.30,r:'Real incomes are falling \u2014 brutal for any sitting candidate.'},
   {n:'Party optimist',t:'partisan',e:.50,r:'Our vote comes home on the day; it always does.'}
  ]},
 {id:'ship',truth:1,
  question:'Will the product ship before year-end?',
  resolution:'It shipped in December.',
  analysts:[
   {n:'Eng lead',t:'inside',e:.80,r:'Core build is done; only integration testing remains.'},
   {n:'QA manager',t:'risk',e:.70,r:'A couple of hardware long-leads could slip, but there\u2019s float.'},
   {n:'Ops planner',t:'history',e:.85,r:'This team has hit its last several ship dates.'},
   {n:'Sales director',t:'pressure',e:.65,r:'Commercial pressure is enormous; corners get cut if needed.'},
   {n:'Cynic',t:'sceptic',e:.75,r:'Software always slips a bit \u2014 but not by a whole quarter here.'}
  ]}
];

let S={screen:'intro',i:0,agg:50,scores:[]};
let BARTRUTH=100;

function render(){app.innerHTML='';({intro:rIntro,ask:rAsk,reveal:rReveal,done:rDone})[S.screen]();window.scrollTo&&window.scrollTo(0,0);}

function rIntro(){
  app.appendChild(h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="eyebrow">Forecasting Bench \u00b7 Instrument 08</div>
    <h1>The Aggregator</h1>
    <p class="lede">A panel of forecasters has handed you five separate estimates. Your job isn\u2019t to pick the cleverest one \u2014 it\u2019s to <b>combine</b> them. A crowd of independent, partially-informed guesses is usually sharper than any single member, and there\u2019s a second trick on top: when independent voices <b>agree</b>, the honest answer often sits <b>further out</b> than their average. This instrument trains both moves.</p>
    <div class="card">
      <p class="body-txt">Three questions. For each you\u2019ll see five analysts reason from genuinely different angles, then set your single aggregate forecast. We\u2019ll compare it to the simple average, to an <b>extremized</b> average, and to what actually happened.</p>
      <div class="actions"><button class="primary" id="go">Begin</button></div>
    </div>
    <div class="foot">a crowd beats its members \u00b7 when it is genuinely a crowd</div>
  </div>`));
  document.getElementById('go').onclick=()=>{S.screen='ask';S.i=0;S.agg=50;S.scores=[];render();};
}

function rAsk(){
  const c=SCN[S.i];
  const rows=c.analysts.map(a=>`<div class="analyst"><div class="est">${pct(a.e)}%</div><div><div class="nm">${a.n}<span>${a.t}</span></div><div class="rs">${a.r}</div></div></div>`).join('');
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="steprow"><span class="stepname">Question ${S.i+1} / ${SCN.length}</span><span class="module">combine the panel</span></div>
    <div class="track"><i style="width:${(S.i/SCN.length)*100}%"></i></div>
    <div class="card">
      <div class="qtitle">${c.question}</div>
      ${rows}
      <div class="readout-cap">your single aggregate forecast</div>
      <div class="readout"><span class="pv" id="pv">${S.agg}</span><span class="pct">%</span></div>
      <input type="range" id="sl" min="2" max="98" value="${S.agg}" style="--fill:${S.agg}%">
      <div class="scale"><span>2%</span><span>50%</span><span>98%</span></div>
      <div class="actions"><button class="primary" id="lock">Lock in &amp; compare</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  const sl=card.querySelector('#sl'), pv=card.querySelector('#pv');
  sl.oninput=()=>{S.agg=+sl.value;pv.textContent=S.agg;sl.style.setProperty('--fill',S.agg+'%');};
  card.querySelector('#lock').onclick=()=>{S.screen='reveal';render();};
}

function bar(label,val,color){
  return `<div class="barrow"><div class="bl">${label}</div><div class="bt"><div class="fillb" style="width:${val}%;background:${color}"></div><div class="tmark" style="left:${BARTRUTH}%"></div></div><div class="bv" style="color:${color}">${val}%</div></div>`;
}

function rReveal(){
  const c=SCN[S.i];
  const ps=c.analysts.map(a=>a.e);
  const avg=pct(simpleMean(ps)), ext=pct(extremized(ps,A_EXTREME)), truth=pct(c.truth);
  BARTRUTH=truth;
  const you=S.agg;
  const errYou=Math.abs(you-truth), errAvg=Math.abs(avg-truth), errExt=Math.abs(ext-truth);
  const indErr=Math.round(mean(ps.map(p=>Math.abs(pct(p)-truth))));
  const beatN=ps.filter(p=>Math.abs(pct(p)-truth)>errAvg).length;
  S.scores[S.i]={errYou,errAvg,errExt};
  const last=S.i===SCN.length-1;
  const good=errYou<=Math.max(errAvg,errExt)+6;
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="steprow"><span class="stepname">Question ${S.i+1} \u00b7 the reckoning</span><span class="module">resolved: ${truth?'yes':'no'}</span></div>
    <div class="card">
      <p class="body-txt" style="margin-bottom:16px"><b>${c.resolution}</b></p>
      <div class="bars">
        ${bar('You',you,'#8E7CC3')}
        ${bar('Simple avg',avg,'#E8B04B')}
        ${bar('Extremized',ext,'#E07A5F')}
        ${bar('Truth',truth,'#4FB3A6')}
      </div>
      <div class="barlegend">the teal line marks the truth (${truth}%)</div>
      <div class="verdict ${good?'good':'miss'}">
        <b>${good?'Good aggregation.':'The crowd had more to give.'}</b> The simple average (${avg}%) beat ${beatN} of the five analysts outright \u2014 the typical analyst missed by ${indErr} points, the average by only ${errAvg}. Extremizing pushed it to ${ext}%, landing ${errExt<errAvg?'closer still':'about the same'}. You came in ${errYou} points from the truth.
      </div>
      <p class="body-txt mt" style="font-size:13px;color:var(--faint)">Why extremizing helps here: these analysts reason from different angles \u2014 mechanism, base rates, ground truth \u2014 so their shared signal is real and each individually under-commits. When forecasters instead echo one source, extremizing overshoots. It is a scalpel, not a hammer.</p>
      <div class="actions"><button class="primary" id="next">${last?'See the lesson':'Next question'}</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  card.querySelector('#next').onclick=()=>{ if(last){S.screen='done';render();} else {S.i++;S.agg=50;S.screen='ask';render();} };
}

function rDone(){
  const yT=mean(S.scores.map(s=>s.errYou)).toFixed(1);
  const aT=mean(S.scores.map(s=>s.errAvg)).toFixed(1);
  const eT=mean(S.scores.map(s=>s.errExt)).toFixed(1);
  app.appendChild(h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="eyebrow">Forecasting Bench \u00b7 Instrument 08 \u00b7 Reading</div>
    <h1>The crowd, sharpened.</h1>
    <div class="card">
      <div class="kpis">
        <div class="kpi"><div class="v" style="color:var(--gut)">${yT}</div><div class="k">your avg error<br>(points)</div></div>
        <div class="kpi"><div class="v" style="color:var(--signal)">${aT}</div><div class="k">simple average</div></div>
        <div class="kpi"><div class="v" style="color:var(--warn)">${eT}</div><div class="k">extremized</div></div>
      </div>
      <p class="body-txt">Across the three, the simple average was hard to beat \u2014 and extremizing usually edged it. The lesson isn\u2019t that you should always push outward; it\u2019s knowing <b>when</b> the move is earned.</p>
    </div>
    <div class="card">
      <ul class="lesson">
        <li><b>A genuine crowd beats its members.</b> Averaging independent estimates cancels individual error, so the mean sits reliably closer to the truth than the typical single forecaster.</li>
        <li><b>Independent agreement licenses extremizing.</b> When voices reason from different evidence and still converge, their shared signal is stronger than any one of them realised \u2014 so the honest answer sits further from 50% than the average.</li>
        <li><b>Correlated voices do not.</b> If the panel is really one opinion echoed five times, the agreement is fake, and extremizing turns a single guess into false confidence. Ask whether the agreement was arrived at independently before you reward it.</li>
        <li><b>It compounds with the odds lesson.</b> Extremizing is just adding weight in log-odds for each independent confirmation \u2014 the same arithmetic the Weighbridge makes you feel.</li>
      </ul>
      <div class="actions">
        <button class="primary" id="again">Run it again</button>
        <a href="index.html"><button class="ghost">Back to the bench</button></a>
      </div>
    </div>
    <div class="foot">average the independent \u00b7 extremize the genuinely agreed</div>
  </div>`));
  document.getElementById('again').onclick=()=>{S.screen='intro';render();};
}

render();
</script>
</body>
</html>
