<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Calibration Range \u00b7 Forecasting Bench</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --ground:#0E1218;--panel:#171D27;--panel-2:#1E2530;--line:#2B333F;--line-2:#3A4654;
  --ink:#E9ECF2;--muted:#8A95A6;--faint:#5A6475;
  --signal:#E8B04B;--truth:#4FB3A6;--warn:#E07A5F;--gut:#8E7CC3;
  --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ground);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;justify-content:center;padding:28px 18px 70px}
.wrap{width:100%;max-width:680px}
.back{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-decoration:none;margin-bottom:18px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--signal);margin-bottom:12px}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,6vw,44px);letter-spacing:-.02em;line-height:1.02;margin-bottom:16px}
.lede{color:var(--muted);font-size:15.5px;line-height:1.62}
.lede b{color:var(--ink);font-weight:600}
.card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:22px;box-shadow:0 10px 30px var(--shadow);margin-top:20px}
.mt-l{margin-top:22px}
.field-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:11px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 14px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--line-2);color:var(--ink)}
.chip[aria-pressed="true"]{border-color:var(--signal);color:var(--signal);background:rgba(232,176,75,.1)}
.steprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.qcount{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.domtag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--signal)}
.track{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:18px}
.track i{display:block;height:100%;background:var(--signal);transition:width .3s}
.qtype{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.claim{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;line-height:1.3;margin-bottom:18px}
.readout{text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:600}
.readout #pv{font-size:40px;color:var(--gut)}.readout .pct{font-size:20px;color:var(--muted)}
.readout-cap{text-align:center;font-size:12.5px;color:var(--faint);margin-bottom:4px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--gut) var(--fill,50%),var(--line) var(--fill,50%));outline:none;cursor:pointer;margin:10px 0;touch-action:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--gut);border:3px solid var(--ground);box-shadow:0 0 0 1px var(--gut),0 2px 6px var(--shadow);cursor:grab}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--gut);border:3px solid var(--ground);box-shadow:0 0 0 1px var(--gut);cursor:grab}
input[type=range]:focus-visible{outline:2px solid var(--gut);outline-offset:6px}
.scale{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint)}
.range-row{display:flex;gap:12px}
.range-cell{flex:1}
.range-cell label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);margin-bottom:6px}
.range-cell input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:18px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--ink);outline:none}
.range-cell input:focus{border-color:var(--gut)}
.unit{text-align:center;font-size:13px;color:var(--muted);margin-top:12px}
.hint{font-size:12.5px;color:var(--faint);line-height:1.5;margin-top:12px}
.actions{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
button.primary{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;background:var(--signal);color:#1a1205;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;transition:.15s}
button.primary:hover{filter:brightness(1.07)}
button.ghost{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14px;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:13px 18px;cursor:pointer}
button.ghost:hover{border-color:var(--line-2);color:var(--ink)}
.verdict{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;border-radius:11px;padding:14px 16px}
.verdict .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.verdict.ok{background:rgba(79,179,166,.12);color:var(--truth)}.verdict.ok .dot{background:var(--truth)}
.verdict.miss{background:rgba(224,122,95,.12);color:var(--warn)}.verdict.miss .dot{background:var(--warn)}
.reveal-fact{font-size:15px;line-height:1.55;margin-top:14px;color:var(--ink)}
.reveal-fact b{color:var(--signal)}
.metricline{display:flex;gap:10px;margin-top:14px}
.metric{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px;text-align:center}
.metric .v{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--ink)}
.metric .k{font-size:11px;color:var(--faint);margin-top:3px}
.explain{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:14px}
svg{display:block;width:100%;height:auto;max-width:380px;margin:0 auto}
.plotwrap{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:12px 8px 6px;margin:6px 0 14px}
.diagnosis h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.diagnosis p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.diagnosis p b{color:var(--ink)}
.foot{margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--faint);text-align:center}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const app=document.getElementById('app');
function h(s){const t=document.createElement('template');t.innerHTML=s.trim();return t.content.firstChild;}
const fmtNum=n=>Number(n).toLocaleString('en-GB');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- item bank (all facts verified) ---------- */
const BANK=[
 {d:'Geography',type:'claim',q:'Canada has a larger total area than China.',a:true,e:'Canada is about 9.98M km\u00b2; China about 9.6M. Canada edges it.'},
 {d:'Geography',type:'claim',q:'The Atlantic Ocean is larger than the Indian Ocean.',a:true,e:'Order is Pacific, then Atlantic, then Indian.'},
 {d:'Geography',type:'claim',q:'K2 is taller than Kangchenjunga.',a:true,e:'K2 is 8,611 m; Kangchenjunga 8,586 m. Close, but K2 wins.'},
 {d:'Geography',type:'claim',q:'Greenland has a larger area than Mexico.',a:true,e:'Greenland ~2.16M km\u00b2 vs Mexico ~1.96M.'},
 {d:'Geography',type:'claim',q:'Australia has a larger land area than Brazil.',a:false,e:'Brazil (~8.5M km\u00b2) is larger than Australia (~7.7M). A common map-distortion trap.'},
 {d:'Geography',type:'claim',q:'Istanbul sits on two continents.',a:true,e:'The Bosphorus splits it between Europe and Asia.'},
 {d:'Geography',type:'claim',q:'The Sahara is larger than Australia.',a:true,e:'The Sahara is ~9.2M km\u00b2; Australia ~7.7M.'},
 {d:'Geography',type:'range',q:'Height of Mount Everest above sea level.',a:8849,unit:'metres',e:'8,849 m, per the 2020 China\u2013Nepal re-survey.'},
 {d:'Geography',type:'range',q:'Height of Mount Kilimanjaro.',a:5895,unit:'metres',e:'5,895 m \u2014 the highest point in Africa.'},
 {d:'Geography',type:'range',q:'Length of the River Nile.',a:6650,unit:'kilometres',e:'Commonly given as ~6,650 km.'},
 {d:'Geography',type:'range',q:'Great-circle air distance, London to New York.',a:5570,unit:'kilometres',e:'About 5,570 km.'},
 {d:'Geography',type:'range',q:'Depth of the Challenger Deep, the ocean\u2019s deepest point.',a:10920,unit:'metres',e:'About 10,920 m, in the Mariana Trench.'},
 {d:'History',type:'claim',q:'Gutenberg\u2019s printing press predates the fall of Constantinople.',a:true,e:'Press ~1440; Constantinople fell 1453.'},
 {d:'History',type:'claim',q:'Darwin\u2019s On the Origin of Species was published before Marx\u2019s Das Kapital.',a:true,e:'Origin 1859; Das Kapital vol. 1, 1867.'},
 {d:'History',type:'claim',q:'Cleopatra lived closer in time to the Moon landing than to the building of the Great Pyramid.',a:true,e:'Pyramid ~2560 BC, Cleopatra ~30 BC, Moon landing 1969.'},
 {d:'History',type:'claim',q:'The Roman Colosseum was completed before the birth of Christ.',a:false,e:'It was completed around 80 AD.'},
 {d:'History',type:'claim',q:'The Magna Carta was sealed in the 13th century.',a:true,e:'1215.'},
 {d:'History',type:'claim',q:'Oxford University is older than the Aztec capital Tenochtitlan.',a:true,e:'Teaching at Oxford dates to ~1096; Tenochtitlan was founded in 1325.'},
 {d:'History',type:'claim',q:'A working fax machine existed before the American Civil War began.',a:true,e:'Alexander Bain patented a fax-like device in 1843; the war began 1861.'},
 {d:'History',type:'range',q:'Year the Berlin Wall fell.',a:1989,unit:'year',e:'9 November 1989.'},
 {d:'History',type:'range',q:'Year construction of the Eiffel Tower was completed.',a:1889,unit:'year',e:'1889, for the World\u2019s Fair.'},
 {d:'History',type:'range',q:'Year the RMS Titanic sank.',a:1912,unit:'year',e:'April 1912.'},
 {d:'History',type:'range',q:'Year Apollo 11 first landed humans on the Moon.',a:1969,unit:'year',e:'July 1969.'},
 {d:'History',type:'range',q:'Year the first iPhone was released.',a:2007,unit:'year',e:'2007.'},
 {d:'Science',type:'claim',q:'A bolt of lightning is hotter than the surface of the Sun.',a:true,e:'Lightning peaks near 30,000\u00b0C; the Sun\u2019s surface is ~5,500\u00b0C.'},
 {d:'Science',type:'claim',q:'Oxygen is the most abundant element in the Earth\u2019s crust by mass.',a:true,e:'~46% oxygen, ~28% silicon.'},
 {d:'Science',type:'claim',q:'Light from the Sun takes more than five minutes to reach the Earth.',a:true,e:'About 8 minutes 20 seconds.'},
 {d:'Science',type:'claim',q:'Venus is the hottest planet in the Solar System.',a:true,e:'Its thick CO\u2082 atmosphere makes it hotter than Mercury despite being further out.'},
 {d:'Science',type:'claim',q:'Human blood is blue before it is exposed to oxygen.',a:false,e:'Blood is always red; veins only look blue through skin.'},
 {d:'Science',type:'claim',q:'A day on Venus is longer than a year on Venus.',a:true,e:'Venus rotates once every ~243 Earth days but orbits the Sun in ~225.'},
 {d:'Science',type:'claim',q:'Sharks have existed for longer than trees.',a:true,e:'Sharks ~450M years; trees ~390M years.'},
 {d:'Science',type:'claim',q:'The Great Wall of China is visible from the Moon with the naked eye.',a:false,e:'It is not \u2014 it\u2019s far too narrow.'},
 {d:'Science',type:'range',q:'Number of bones in the adult human body.',a:206,unit:'bones',e:'206 in a typical adult.'},
 {d:'Science',type:'range',q:'Speed of light in a vacuum.',a:299792,unit:'km per second',e:'299,792 km/s.'},
 {d:'Science',type:'range',q:'Average distance from the Earth to the Moon.',a:384400,unit:'kilometres',e:'About 384,400 km.'},
 {d:'Science',type:'range',q:'Boiling point of water at sea level.',a:100,unit:'\u00b0C',e:'100\u00b0C at standard pressure.'}
];
const DOMAINS=['Mixed','Geography','History','Science'];

/* ---------- lifetime store ---------- */
const LKEY='forecasting_bench_calibration_v2';
const NBINS=5;
function freshLT(){return{rounds:0,brierSum:0,brierN:0,rangeN:0,rangeHits:0,bins:Array.from({length:NBINS},()=>({n:0,sumP:0,sumTrue:0}))};}
let LT=freshLT();
async function loadLT(){try{if(window.storage){const r=await window.storage.get(LKEY);if(r&&r.value)LT=JSON.parse(r.value);}}catch(e){}}
async function saveLT(){try{if(window.storage)await window.storage.set(LKEY,JSON.stringify(LT));}catch(e){}}
async function resetLT(){LT=freshLT();try{if(window.storage)await window.storage.delete(LKEY);}catch(e){}}

let state={screen:'start',domain:'Mixed',deck:[],idx:0,p:50,low:'',high:'',responses:[]};

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawDeck(domain){
  const pool=domain==='Mixed'?BANK:BANK.filter(x=>x.d===domain);
  const claims=shuffle(pool.filter(x=>x.type==='claim'));
  const ranges=shuffle(pool.filter(x=>x.type==='range'));
  const deck=[];
  const nC=Math.min(6,claims.length), nR=Math.min(4,ranges.length);
  for(let i=0;i<nC;i++)deck.push(claims[i]);
  for(let i=0;i<nR;i++)deck.push(ranges[i]);
  return shuffle(deck).slice(0,10);
}

function render(){
  app.innerHTML='';
  if(state.screen==='start')return rStart();
  if(state.screen==='question')return rQuestion();
  if(state.screen==='reveal')return rReveal();
  if(state.screen==='summary')return rSummary();
}

function rStart(){
  const chips=DOMAINS.map(d=>`<button class="chip" data-d="${d}" aria-pressed="${d===state.domain}">${d}</button>`).join('');
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="eyebrow">Forecasting Bench \u00b7 Instrument 01</div>
    <h1>The Calibration Range</h1>
    <p class="lede">When you say something is <b>70% likely</b>, is it true about 70% of the time? A good forecaster isn\u2019t just knowledgeable \u2014 their confidence <b>matches reality</b>. This range trains that match.<br><br>Ten items. For each claim, set how likely it is to be <b>true</b>. For each quantity, give a range you\u2019re <b>90% sure</b> contains the answer. Your calibration curve builds up across every round.</p>
    <div class="card mt-l">
      <div class="field-label">Choose a quiz set</div>
      <div class="chips" id="chips">${chips}</div>
      <div class="actions">
        <button class="primary" id="startBtn">Begin round</button>
        <button class="ghost" id="resetBtn">Reset history</button>
      </div>
    </div>
    <div class="foot">probabilistic reasoning \u00b7 calibration \u00b7 over- and under-confidence</div>
  </div>`);
  app.appendChild(card);
  card.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{state.domain=c.dataset.d;render();});
  card.querySelector('#startBtn').onclick=()=>{
    state.deck=drawDeck(state.domain);state.idx=0;state.responses=[];state.p=50;state.low='';state.high='';
    state.screen='question';render();
  };
  card.querySelector('#resetBtn').onclick=async()=>{
    await resetLT();
    const b=card.querySelector('#resetBtn');b.textContent='History cleared';
    setTimeout(()=>{b.textContent='Reset history';},1400);
  };
}

function rQuestion(){
  const q=state.deck[state.idx];
  const pctDone=(state.idx/state.deck.length)*100;
  let inputHTML;
  if(q.type==='claim'){
    inputHTML=`
      <div class="readout"><span id="pv">${state.p}</span><span class="pct">%</span></div>
      <div class="readout-cap">chance this is true</div>
      <input type="range" id="slider" min="0" max="100" step="1" value="${state.p}" style="--fill:${state.p}%">
      <div class="scale"><span>0 \u00b7 false</span><span>50 \u00b7 unsure</span><span>100 \u00b7 true</span></div>`;
  }else{
    inputHTML=`
      <div class="range-row">
        <div class="range-cell"><label>Low bound</label><input id="low" type="number" inputmode="numeric" value="${state.low}" placeholder="\u2013"></div>
        <div class="range-cell"><label>High bound</label><input id="high" type="number" inputmode="numeric" value="${state.high}" placeholder="\u2013"></div>
      </div>
      <div class="unit">${q.unit}</div>
      <div class="hint">Pick bounds wide enough that you\u2019d be genuinely surprised \u2014 about 1 time in 10 \u2014 if the true value fell outside them.</div>`;
  }
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="steprow"><span class="qcount">Item ${state.idx+1} / ${state.deck.length}</span><span class="domtag">${q.d}</span></div>
    <div class="track"><i style="width:${pctDone}%"></i></div>
    <div class="card">
      <div class="qtype">${q.type==='claim'?'True or false':'Estimate \u2014 90% interval'}</div>
      <div class="claim">${q.q}</div>
      ${inputHTML}
      <div class="actions"><button class="primary" id="submit">Lock it in</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  if(q.type==='claim'){
    const s=card.querySelector('#slider'),pv=card.querySelector('#pv');
    s.oninput=()=>{state.p=+s.value;pv.textContent=state.p;s.style.setProperty('--fill',state.p+'%');};
    card.querySelector('#submit').onclick=()=>submitClaim(q);
  }else{
    const lo=card.querySelector('#low'),hi=card.querySelector('#high');
    lo.oninput=()=>state.low=lo.value;hi.oninput=()=>state.high=hi.value;
    card.querySelector('#submit').onclick=()=>submitRange(q,lo,hi);
  }
}

function submitClaim(q){
  const p=state.p/100, truth=q.a?1:0, brier=(p-truth)*(p-truth);
  state.responses.push({type:'claim',q,p,truth,brier});
  state.reveal={kind:'claim',q,p,truth,brier};
  state.screen='reveal';render();
}
function submitRange(q,lo,hi){
  let low=parseFloat(lo.value),high=parseFloat(hi.value);
  if(isNaN(low)||isNaN(high)){lo.style.borderColor='#E07A5F';hi.style.borderColor='#E07A5F';return;}
  if(low>high){const t=low;low=high;high=t;}
  const hit=q.a>=low&&q.a<=high;
  state.responses.push({type:'range',q,low,high,hit});
  state.reveal={kind:'range',q,low,high,hit};
  state.screen='reveal';render();
}

function rReveal(){
  const r=state.reveal;
  const last=state.idx===state.deck.length-1;
  let inner;
  if(r.kind==='claim'){
    const correctSide=(r.p>=0.5)===(r.truth===1);
    inner=`
      <div class="verdict ${correctSide?'ok':'miss'}"><span class="dot"></span>${r.q.a?'This is TRUE':'This is FALSE'}</div>
      <div class="reveal-fact">You put it at <b>${Math.round(r.p*100)}%</b> likely to be true.</div>
      <div class="metricline">
        <div class="metric"><div class="v">${r.brier.toFixed(3)}</div><div class="k">Brier score</div></div>
        <div class="metric"><div class="v">${correctSide?'right side':'wrong side'}</div><div class="k">of 50/50</div></div>
      </div>
      <div class="explain">${r.q.e}<br><span style="color:var(--faint)">A Brier score is the squared gap between your probability and what happened: 0 is perfect, 0.25 is what you\u2019d get always guessing 50%.</span></div>`;
  }else{
    inner=`
      <div class="verdict ${r.hit?'ok':'miss'}"><span class="dot"></span>${r.hit?'Inside your range':'Outside your range'}</div>
      <div class="reveal-fact">True value: <b>${fmtNum(r.q.a)}</b> ${r.q.unit}. <span style="color:var(--muted)">You said ${fmtNum(r.low)} \u2013 ${fmtNum(r.high)}.</span></div>
      <div class="explain">${r.q.e}<br><span style="color:var(--faint)">A well-calibrated 90% interval should catch the answer about 9 times in 10. Most people\u2019s catch it far less \u2014 the classic sign of over-confidence.</span></div>`;
  }
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="steprow"><span class="qcount">Item ${state.idx+1} / ${state.deck.length}</span><span class="domtag">${r.q.d}</span></div>
    <div class="track"><i style="width:${((state.idx+1)/state.deck.length)*100}%"></i></div>
    <div class="card">
      ${inner}
      <div class="actions"><button class="primary" id="next">${last?'See your calibration':'Next item'}</button></div>
    </div>
  </div>`);
  app.appendChild(card);
  card.querySelector('#next').onclick=()=>{
    if(last){finishRound();}
    else{state.idx++;state.p=50;state.low='';state.high='';state.screen='question';render();}
  };
}

function finishRound(){
  LT.rounds+=1;
  state.responses.forEach(r=>{
    if(r.type==='claim'){
      LT.brierSum+=r.brier;LT.brierN+=1;
      const bin=Math.min(NBINS-1,Math.floor(r.p*NBINS));
      LT.bins[bin].n+=1;LT.bins[bin].sumP+=r.p;LT.bins[bin].sumTrue+=r.truth;
    }else{
      LT.rangeN+=1;if(r.hit)LT.rangeHits+=1;
    }
  });
  saveLT();
  state.screen='summary';render();
}

/* ---------- calibration plot ---------- */
function calibrationPlot(){
  const W=380,H=380,pad=46;
  const x=v=>pad+v*(W-2*pad), y=v=>H-pad-v*(H-2*pad);
  let g='';
  for(let i=0;i<=10;i+=2){const gx=x(i/10),gy=y(i/10);
    g+=`<line x1="${x(0)}" y1="${gy}" x2="${x(1)}" y2="${gy}" stroke="#2B333F" stroke-width="1"/>`;
    g+=`<line x1="${gx}" y1="${y(0)}" x2="${gx}" y2="${y(1)}" stroke="#2B333F" stroke-width="1"/>`;
  }
  g+=`<line x1="${x(0)}" y1="${y(0)}" x2="${x(1)}" y2="${y(1)}" stroke="#5A6475" stroke-width="1.5" stroke-dasharray="5 4"/>`;
  g+=`<text x="${x(0.5)}" y="${H-10}" text-anchor="middle" fill="#5A6475" font-family="IBM Plex Mono" font-size="11">you said \u2192</text>`;
  g+=`<text x="14" y="${y(0.5)}" text-anchor="middle" fill="#5A6475" font-family="IBM Plex Mono" font-size="11" transform="rotate(-90 14 ${y(0.5)})">actually true \u2192</text>`;
  let pts='';
  LT.bins.forEach(b=>{
    if(b.n===0)return;
    const px=b.sumP/b.n, py=b.sumTrue/b.n, r=Math.min(15,6+Math.sqrt(b.n)*1.7);
    pts+=`<circle cx="${x(px)}" cy="${y(py)}" r="${r}" fill="rgba(232,176,75,.22)" stroke="#E8B04B" stroke-width="1.8"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Calibration plot">${g}${pts}</svg>`;
}

function diagnose(){
  const parts=[];
  if(LT.brierN>0){
    const avgBrier=LT.brierSum/LT.brierN;
    let oc=0,n=0;
    LT.bins.forEach(b=>{if(b.n){oc+=(b.sumP/b.n-b.sumTrue/b.n)*b.n;n+=b.n;}});
    oc=n?oc/n:0;
    let verdict;
    if(oc>0.08)verdict='you tend to be <b>over-confident</b> \u2014 your high probabilities come true less often than you claim';
    else if(oc<-0.08)verdict='you tend to be <b>under-confident</b> \u2014 things you call uncertain happen more often than you say';
    else verdict='your claim confidence is <b>well-matched</b> to reality';
    parts.push(`<p>Across <b>${LT.brierN}</b> true/false items your average Brier score is <b>${avgBrier.toFixed(3)}</b> (lower is better; 0.25 is the always-50% baseline). On the curve, ${verdict}. Points above the dashed line mean you were too cautious; below it, too bold.</p>`);
  }
  if(LT.rangeN>0){
    const hr=LT.rangeHits/LT.rangeN;
    let rv;
    if(hr<0.75)rv='Your 90% intervals caught the answer only <b>'+Math.round(hr*100)+'%</b> of the time \u2014 they\u2019re too narrow. This is the most common miscalibration: widen them until being wrong genuinely surprises you.';
    else if(hr>0.97)rv='Your 90% intervals caught <b>'+Math.round(hr*100)+'%</b> \u2014 a touch too wide. You can afford to be a little bolder.';
    else rv='Your 90% intervals caught <b>'+Math.round(hr*100)+'%</b> \u2014 close to the 90% target. Nicely calibrated.';
    parts.push(`<p>${rv}</p>`);
  }
  if(!parts.length)parts.push('<p>Play a round and your reading will appear here.</p>');
  return parts.join('');
}

function rSummary(){
  const card=h(`<div>
    <a class="back" href="index.html">&larr; The Forecasting Bench</a>
    <div class="eyebrow">Forecasting Bench \u00b7 Instrument 01 \u00b7 Reading</div>
    <h1>Your calibration curve.</h1>
    <p class="lede">Built from every item you\u2019ve answered on this device \u2014 <b>${LT.rounds}</b> round${LT.rounds===1?'':'s'} so far. Perfect calibration sits on the dashed diagonal.</p>
    <div class="card">
      <div class="plotwrap">${calibrationPlot()}</div>
      <div class="diagnosis"><h3>The instrument reads</h3>${diagnose()}</div>
    </div>
    <div class="card">
      <div class="actions">
        <button class="primary" id="again">Another round</button>
        <button class="ghost" id="home">Change set</button>
      </div>
    </div>
    <div class="foot">confidence should match reality \u00b7 nothing more, nothing less</div>
  </div>`);
  app.appendChild(card);
  card.querySelector('#again').onclick=()=>{
    state.deck=drawDeck(state.domain);state.idx=0;state.responses=[];state.p=50;state.low='';state.high='';
    state.screen='question';render();
  };
  card.querySelector('#home').onclick=()=>{state.screen='start';render();};
}

(async()=>{await loadLT();render();})();
</script>
